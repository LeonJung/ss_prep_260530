# Single source of truth for robot topic/joint contracts.
# Both ros2_bridge and data_recorder read this — keep names exact.

ur10e:
  # Record-time state (teleop running): published by ur10e_teleop_real_py /
  # ur10e_teleop_unilateral_vive_cpp with the bimanual `/right/` prefix in
  # the current lab setup. Single-arm-right operation for now.
  state_topic_teleop: /ur10e/right/follower/joint_state
  # Deploy-time state (ros2_control native) — confirm once ur10e_bringup
  # runs, may need `/ur10e/right/joint_states` or similar prefix.
  state_topic_deploy: /joint_states
  # Deploy-time command (JTC action)
  command_action: /joint_trajectory_controller/follow_joint_trajectory
  joint_names:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint
  dof: 6

dg5f:
  # Toggle the whole hand off if the device isn't connected — RobotIO will
  # skip the subscriber/publisher, recorder writes UR-only state/action,
  # and ACT trains a 6-dim policy. CLI scripts accept --no-dg5f / --dg5f
  # to override this default per-run.
  enabled: true
  side: right                       # right | left  (left hand currently at vendor for repair)
  state_topic: /dg5f_right/joint_states
  # Production controller is a single multi-DOF pid_controller/PidController
  # named rj_dg_pospid (right) / lj_dg_pospid (left). Commands are published
  # as control_msgs/MultiDOFCommand at ~50 Hz on the controller's reference
  # topic. NOT a FollowJointTrajectory action.
  command_controller: rj_dg_pospid
  command_topic: /dg5f_right/rj_dg_pospid/reference
  # Joint name pattern is rj_dg_{finger}_{joint}, finger 1..5, joint 1..4.
  joint_names:
    - rj_dg_1_1
    - rj_dg_1_2
    - rj_dg_1_3
    - rj_dg_1_4
    - rj_dg_2_1
    - rj_dg_2_2
    - rj_dg_2_3
    - rj_dg_2_4
    - rj_dg_3_1
    - rj_dg_3_2
    - rj_dg_3_3
    - rj_dg_3_4
    - rj_dg_4_1
    - rj_dg_4_2
    - rj_dg_4_3
    - rj_dg_4_4
    - rj_dg_5_1
    - rj_dg_5_2
    - rj_dg_5_3
    - rj_dg_5_4
  dof: 20

cameras:
  # realsense2_camera launched with `camera_name:=wrist_cam` (and default
  # namespace `camera`) → /camera/wrist_cam/color/image_raw.
  # Publish at 424x240 so per-frame size drops from 1.22 MB to ~305 KB
  # (~9 MB/s/cam over zenoh), keeping the recorder loop near 30 Hz.
  # ACT will resize this further internally to ~224x224 anyway.
  # NUC launch:
  #   ros2 launch realsense2_camera rs_launch.py \\
  #       camera_name:=wrist_cam serial_no:='"218622270770"' \\
  #       rgb_camera.color_profile:=424x240x30
  - name: wrist_cam
    topic: /camera/wrist_cam/color/image_raw
    compressed: false
    width: 480
    height: 270
    rate_hz: 30
  - name: scene_cam
    topic: /camera/scene_cam/color/image_raw
    compressed: false
    width: 480
    height: 270
    rate_hz: 30

# Recorder loop rate. Camera rate is the bottleneck → match it.
record_rate_hz: 30

# Store frames as raw uint8 arrays in parquet (image dtype) rather than
# mp4 (video dtype). Set true once the training PC has a torchcodec
# build that matches its ffmpeg — until then this side-steps the whole
# torchcodec/ffmpeg ABI matrix at the cost of disk space (~270 MB per
# 30-frame chunk @ 480×640×3 × 2 cams).
use_videos: false

# Two services:
#   zenohd   — long-running rmw_zenoh_cpp router. The controller PC dials
#              in to TCP 7447 here, so this MUST be running before any
#              pai_teach command that touches ROS topics. Start it once:
#                 docker compose up -d zenohd
#   pai_teach — interactive runner for scripts. One-shot:
#                 docker compose run --rm pai_teach <cmd>
#
# `network_mode: host` is needed so the controller PC reaches our 7447
# at 10.42.0.1 (and so the in-container ROS2 graph sees the same host).
services:
  zenohd:
    build: .
    image: pai_teach:latest
    network_mode: host
    restart: unless-stopped
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ROS_DOMAIN_ID=15
    command: bash -c 'source /opt/ros/jazzy/setup.bash && exec ros2 run rmw_zenoh_cpp rmw_zenohd'

  pai_teach:
    image: pai_teach:latest
    network_mode: host
    ipc: host
    # SYS_NICE lets SVT-AV1 (used by lerobot's mp4 encoder) set thread
    # priorities and stops the "Failed to set thread priority: invalid
    # argument" warning. Encoding works without it; this just quiets noise.
    cap_add:
      - SYS_NICE
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ROS_DOMAIN_ID=15
      # The local zenohd above is on the same host, so multicast scout
      # finds it without needing the explicit session config.
      - HF_HOME=/workspace/.cache/huggingface
      - WANDB_DIR=/workspace/.cache/wandb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - zenohd

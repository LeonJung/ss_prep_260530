# Single service; run with: `docker compose run --rm pai_teach <cmd>`
# `network_mode: host` is needed so the in-container ROS2 graph sees
# topics published on the host (or coming in over zenoh).
services:
  pai_teach:
    build: .
    image: pai_teach:latest
    network_mode: host
    ipc: host
    # SYS_NICE lets SVT-AV1 (used by lerobot's mp4 encoder) set thread
    # priorities and stops the "Failed to set thread priority: invalid
    # argument" warning. Encoding works without it; this just quiets noise.
    cap_add:
      - SYS_NICE
    environment:
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ROS_DOMAIN_ID=15
      # Point zenoh at the controller PC's router explicitly (multicast
      # discovery is unreliable across most switches).
      - ZENOH_SESSION_CONFIG_URI=/workspace/zenoh_session_config.json5
      - HF_HOME=/workspace/.cache/huggingface
      - WANDB_DIR=/workspace/.cache/wandb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true

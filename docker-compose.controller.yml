# Controller-PC compose. Uses the SAME pai_teach:latest image as the
# training PC (jazzy + Python 3.12, since lerobot now requires 3.12 and
# can't run on humble's 3.10). Talks to the host's native humble
# teleop / dg5f / realsense nodes over the standard DDS RTPS wire
# (rmw_fastrtps_cpp), which is cross-distro-compatible same-host.
#
# Build (on this host — only needed if the image isn't already loaded):
#   docker compose -f docker-compose.controller.yml build
#
# Run:
#   docker compose -f docker-compose.controller.yml run --rm pai_teach_ctrl bash
services:
  pai_teach_ctrl:
    build:
      context: .
      dockerfile: Dockerfile
    image: pai_teach:latest
    network_mode: host
    ipc: host
    environment:
      # Override the image default of rmw_zenoh_cpp. fastdds is what the
      # host's native ROS humble nodes are using and what we need for
      # cross-distro same-host RTPS discovery.
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=15
      - HF_HOME=/workspace/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
